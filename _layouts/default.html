<!doctype html>
<html lang="{{ page.lang | default: site.lang | default: 'zh-CN' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} - {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    <meta name="description" content="{{ page.description | default: site.description | escape }}">
    <meta name="theme-color" content="#070707">
    <meta property="og:title" content="{{ page.title | default: site.title | escape }}">
    <meta property="og:description" content="{{ page.description | default: site.description | escape }}">
    <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
    <link rel="canonical" href="{{ page.url | absolute_url }}">
    <link rel="alternate" type="application/rss+xml" title="{{ site.title }} RSS" href="{{ '/feed.xml' | relative_url }}">
    <link rel="icon" href="{{ '/favicon.svg' | relative_url }}" type="image/svg+xml">
    <link rel="stylesheet" href="{{ '/styles.css' | relative_url }}">
  </head>
  <body>
    <div class="shell">
      <header class="site-header" aria-label="Site header">
        <a class="brand" href="{{ '/' | relative_url }}" aria-label="{{ site.title }} home">{{ site.title }}</a>
        <nav class="nav" aria-label="Primary navigation">
          <a href="{{ '/#posts' | relative_url }}">posts</a>
          <a href="https://h40y.github.io/genshin-log/">genshin.log</a>
          <a href="https://github.com/h40y">github</a>
          <a href="{{ '/feed.xml' | relative_url }}">rss</a>
        </nav>
      </header>

      <main>
        {{ content }}
      </main>

      <footer class="site-footer">
        <span>© 2026 {{ site.title }}</span>
        <span>Built for GitHub Pages.</span>
      </footer>
    </div>
    {% if page.typewriter %}
    <script src="{{ '/typewriter.js' | relative_url }}" defer></script>
    {% endif %}
  </body>
</html>
