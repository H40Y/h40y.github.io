          <h1>Hello, dark</h1>
          <p>
            这个站点从一个很小的想法开始：页面要暗，内容要轻，入口要足够直接。
          </p>
          <p>
            博客不需要先变成一个系统。它可以只是几个静态页面，一点清楚的排版，以及持续写下去的空间。
          </p>
          <h2>原则</h2>
          <ul>
            <li>不使用构建步骤，推送到 GitHub Pages 后即可访问。</li>
            <li>只保留深色视觉，减少主题切换和装饰负担。</li>
            <li>文章页专注阅读，首页专注索引。</li>
          </ul>
